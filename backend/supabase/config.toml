# Supabase CLI local development config
# Run `supabase link --project-ref YOUR_PROJECT_REF` to link to your remote project
# Get YOUR_PROJECT_REF from: Supabase Dashboard → Settings → General → Reference ID

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://adminhrisph.vercel.app"
additional_redirect_urls = [
  "https://hrisph.vercel.app/**",
  "https://adminhrisph.vercel.app/**",
  "http://localhost:3000/**",
  "http://localhost:3001/**",
  "http://localhost:3002/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8
password_requirements = "letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.totp]
app_name = "HRISPH"

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
